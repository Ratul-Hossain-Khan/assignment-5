<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GitHub Issues Tracker</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-lg shadow-lg w-96">

<div class="text-center mb-6">
    <img src="./assets/github-logo.png" alt="" class="w-16 mx-auto mb-4">
<h1 class="text-2xl font-semibold">GitHub Issues Tracker</h1>
<p class="text-[#64748b] ">Sign in to manage your issues</p>
</div>
<label for="uname">Username</label>
<input id="username" class="w-full border p-2 mb-3 rounded" placeholder="Enter Username">

<input id="password" type="password" class="w-full border p-2 mb-3 rounded" placeholder="Enter Password">

<button onclick="login()" class="w-full bg-purple-600 text-white p-2 rounded">
Sign In
</button>

<div class="text-sm text-[#64748b] mt-4 text-center">

</div>


</body>
</html>
